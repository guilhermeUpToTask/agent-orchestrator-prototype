# project_spec.yaml — Canonical specification for agent-orchestrator-prototype.
#
# This file is the single source of truth for the project's architectural
# constraints.  It is read by the orchestrator at startup and injected into
# the planner, validator, and all execution services.
#
# Rules:
#   - Do NOT add goals, tasks, or execution details here.
#   - Do NOT edit this file directly mid-execution.
#   - Changes must go through: orchestrate spec propose → orchestrate spec apply

meta:
  name: agent-orchestrator-prototype
  version: "0.1.0"

objective:
  description: >
    A local multi-agent orchestration system that coordinates CLI-based LLM
    coding agents (Claude Code, Gemini CLI, pi-mono) to autonomously execute
    software tasks on isolated git branches, using Redis Streams for
    event-driven coordination.
  domain: developer-tooling

tech_stack:
  backend:
    - python
    - pydantic
    - pydantic-settings
    - structlog
    - redis
  database:
    - redis-streams
  infra:
    - git
    - docker
    - devcontainer

constraints:
  forbidden:
    - django
    - flask
    - sqlalchemy
    - celery
    - rq
    - dramatiq
  required:
    - pydantic
    - redis
    - structlog

structure:
  directories:
    - name: src/domain
      purpose: >
        Domain layer — aggregates, entities, value objects, repository ports,
        domain events, and domain services.  No infrastructure dependencies.
    - name: src/app
      purpose: >
        Application layer — use cases, orchestrator, reconciliation engine,
        and application services.  Depends only on domain interfaces.
    - name: src/app/handlers
      purpose: >
        Entrypoints — CLI handlers, task manager loop, worker process.
        These are the only places that read environment config directly.
    - name: src/app/usecases
      purpose: >
        Named use cases — one class per user-visible action.
        No direct infrastructure access; all I/O goes through ports.
    - name: src/infra
      purpose: >
        Infrastructure layer — concrete adapters for Redis, filesystem YAML
        repositories, git workspace, runtime adapters (Claude Code, Gemini,
        pi), and logging.
    - name: src/infra/fs
      purpose: >
        Filesystem adapters — YAML-based repositories for tasks, goals,
        agents, and project spec.  All writes are atomic.
    - name: tests
      purpose: >
        Test suite — unit tests mirror the src/ layout.  Integration and
        e2e tests live in tests/integration/ and tests/e2e/ respectively.
