name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codex-plugin:
    name: Codex plugin
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository skills, tools, and agents
        run: python plugins/agent-orchestrator-codex/scripts/validate.py

  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev --locked

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy typing ratchet
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest -q tests/unit

      - name: Integration tests
        run: uv run pytest -q tests/integration

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
          python-version: "3.11"

      - name: Install backend dependencies for OpenAPI export
        working-directory: backend
        run: uv sync --all-extras --dev --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Regenerate API types
        run: |
          export PATH="${{ github.workspace }}/backend/.venv/bin:$PATH"
          npm run generate:api

      - name: Verify generated API types are current
        run: |
          if ! git diff --exit-code -- openapi.json src/types/generated; then
            echo "::error::Generated API types are stale. Run 'cd frontend && npm run generate:api' and commit the results."
            exit 1
          fi
