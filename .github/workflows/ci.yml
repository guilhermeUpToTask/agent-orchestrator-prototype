name: Orchestrator CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:

  # -------------------------------------------------------------------------
  # tests
  # -------------------------------------------------------------------------
  tests:
    name: tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Unit + regression tests
        env:
          AGENT_MODE: dry-run
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest tests/unit/ tests/regression/ -v --tb=short --timeout=60 -p no:warnings

      - name: Integration tests (dry-run)
        env:
          AGENT_MODE: dry-run
          REDIS_URL: redis://localhost:6379/1
        run: >
          uv run pytest tests/integration/ -v --tb=short --timeout=120
          -p no:warnings -m "not slow"


  # -------------------------------------------------------------------------
  # lint
  # -------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format
        run: uv run ruff format --check src/ tests/

      - name: mypy
        run: uv run mypy src/ --ignore-missing-imports --no-error-summary --python-version 3.11


  # -------------------------------------------------------------------------
  # build (smoke tests)
  # -------------------------------------------------------------------------
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync

      - name: Smoke-test domain imports
        run: |
          uv run python -c "
          from src.domain import (
              GoalAggregate, GoalStatus, TaskSummary,
              PRInfo, PRStatus, GitHubPort, CIConfig,
          )
          print('domain imports OK')
          "

      - name: Smoke-test CLI entry point
        env:
          AGENT_MODE: dry-run
        run: uv run python -m src.cli --help || true
