[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.serena]
command = "/root/.local/bin/uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "codex", "--project", "/workspaces/agent-orchestrator"]
disabled_tools = ["execute_shell_command"]
startup_timeout_sec = 60

[mcp_servers.sqlite]
command = "/usr/local/bin/uv"
args = ["tool", "run", "--from", "mcp-server-sqlite", "mcp-server-sqlite", "--db-path", "/root/.orchestrator/orchestrator.db"]
enabled_tools = ["read_query", "list_tables", "describe_table"]

[mcp_servers.graphify]
command = "/root/.local/share/uv/tools/graphifyy/bin/python"
args = ["-m", "graphify.serve", "/workspaces/agent-orchestrator/graphify-out/graph.json"]
